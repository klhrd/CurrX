<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CurrX</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5c6bc0">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="brand">CurrX</div>
            <div class="refresh-status" id="refreshStatus">
                正在讀取快取...<br>---
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="refreshBtn" title="重新整理">
                    <i data-lucide="refresh-cw" size="18"></i>
                </button>
                <button class="icon-btn" id="menuBtn" title="設定">
                    <i data-lucide="settings" size="18"></i>
                </button>
            </div>
        </header>

        <!-- Main Display Content -->
        <main class="main-content">
            <div class="display-block">
                <div class="currency-bar-container">
                    <div class="currency-item" id="fromCurrencyBtn">
                        <span class="currency-name" id="fromCurrency">USD</span>
                        <i data-lucide="chevron-down" size="12"></i>
                    </div>
                    <div class="swap-btn" id="swapBtn">
                        <i data-lucide="repeat" size="16"></i>
                    </div>
                    <div class="currency-item" id="toCurrencyBtn">
                        <span class="currency-name" id="toCurrency">TWD</span>
                        <i data-lucide="chevron-down" size="12"></i>
                    </div>
                </div>
                
                <div class="result-area">
                    <div class="expression" id="expressionDisplay"></div>
                    <div class="results">
                        <div class="res-row secondary">
                            <span class="res-val" id="fromValDisplay">0</span>
                            <span class="res-unit" id="fromUnit">USD</span>
                        </div>
                        <div class="res-row primary">
                            <span class="res-val" id="toValDisplay">0</span>
                            <span class="res-unit" id="toUnit">TWD</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Keypad (5-Column) -->
        <div class="keypad">
            <button class="key operator" data-key="(">(</button>
            <button class="key operator" data-key=")">)</button>
            <button class="key operator" data-key="%">%</button>
            <button class="key action span-col-2" data-key="AC">AC</button>
            
            <button class="key operator" data-key="+">+</button>
            <button class="key" data-key="7">7</button>
            <button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button>
            <button class="key action span-row-2" data-key="BACK"><i data-lucide="delete"></i></button>
            
            <button class="key operator" data-key="-">−</button>
            <button class="key" data-key="4">4</button>
            <button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button>
            
            <button class="key operator" data-key="*">×</button>
            <button class="key" data-key="1">1</button>
            <button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button>
            <button class="key equal span-row-2" data-key="=">=</button>
            
            <button class="key operator" data-key="/">÷</button>
            <button class="key span-col-2" data-key="0">0</button>
            <button class="key" data-key=".">.</button>
        </div>
    </div>

    <!-- Side Menu -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="side-menu" id="sideMenu">
            <div class="menu-header">
                <div style="font-size:1.5rem; font-weight:700;">Settings</div>
                <button class="icon-btn" id="closeMenuBtn"><i data-lucide="x"></i></button>
            </div>
            
            <div class="menu-item" id="historyBtn"><i data-lucide="history"></i> 歷史紀錄回溯</div>
            <div class="menu-item">
                <i data-lucide="landmark"></i> 匯率來源
                <select id="apiSourceSelect">
                    <option value="fawazahmed">Fawazahmed0</option>
                    <option value="exchangerate">ExchangeRate</option>
                    <option value="frankfurter">Frankfurter</option>
                </select>
            </div>
            <div class="menu-item">
                <i data-lucide="hash"></i> 小數點位數
                <select id="precisionSelect">
                    <option value="0">0 位</option>
                    <option value="2">2 位</option>
                    <option value="3">3 位</option>
                    <option value="4">4 位</option>
                </select>
            </div>
            <div class="menu-item">
                <i data-lucide="layout"></i> 顯示語言
                <select id="displayModeSelect">
                    <option value="en">僅英文</option>
                    <option value="zh">僅中文</option>
                    <option value="both">兩者併列</option>
                </select>
            </div>
            <div class="menu-item" id="themeToggle">
                <i data-lucide="moon"></i> 深色模式
                <input type="checkbox" id="themeCheckbox" style="margin-left: auto;">
            </div>
            <div class="menu-item" id="shareBtn"><i data-lucide="share-2"></i> 複製與分享</div>
            
            <div class="menu-footer">CurrX v0.1.8</div>
        </div>
    </div>

    <!-- Picker Modal -->
    <div class="menu-overlay" id="pickerOverlay">
        <div class="side-menu" id="pickerContent">
            <div class="menu-header">
                <div style="font-size:1.2rem; font-weight:700;">選擇幣別</div>
                <button class="icon-btn" id="closePickerBtn"><i data-lucide="x"></i></button>
            </div>
            <div class="search-container" style="margin-bottom: 15px;">
                <div style="position: relative; display: flex; align-items: center;">
                    <i data-lucide="search" size="16" style="position: absolute; left: 12px; color: var(--text-secondary);"></i>
                    <input type="text" id="currencySearch" placeholder="搜尋代碼、中文或英文..." 
                        style="width: 100%; padding: 12px 12px 12px 40px; border-radius: 12px; border: none; background: var(--bg-color); color: var(--text-main); font-family: inherit; outline: none;">
                </div>
            </div>
            <div class="currency-list" id="currencyList"></div>
        </div>
    </div>

    <!-- History Overlay -->
    <div class="history-overlay" id="historyOverlay">
        <div class="history-content" id="historyContent">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size:1.5rem; font-weight:700;">History</div>
                <button class="icon-btn" id="closeHistoryBtn"><i data-lucide="x"></i></button>
            </div>
            <div class="history-list" id="historyList"></div>
            <button class="key operator" id="clearHistoryBtn" style="height:60px; width:100%; border-radius:20px; font-weight:700;">清除所有紀錄</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="currencies.js"></script>
    <script src="app.js"></script>
</body>
</html>
