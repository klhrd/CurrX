<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CurrX - 智能貨幣計算機</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="brand">CurrX</div>
            <div class="refresh-status" id="refreshStatus">
                正在讀取快取...<br>---
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="refreshBtn" title="重新整理">
                    <i data-lucide="refresh-cw" size="20"></i>
                </button>
                <button class="icon-btn" id="menuBtn" title="設定">
                    <i data-lucide="settings" size="20"></i>
                </button>
            </div>
        </header>

        <!-- Display Area -->
        <div class="display-section">
            <div class="currency-toggle" id="currencyToggle" title="點擊切換主副幣別">
                <span class="currency-name" id="fromCurrency">USD</span>
                <div class="swap-icon"><i data-lucide="repeat" size="16"></i></div>
                <span class="currency-name" id="toCurrency">TWD</span>
            </div>
            
            <div class="expression-container">
                <div class="expression" id="expressionDisplay"></div>
            </div>
            
            <div class="results">
                <div class="res-row secondary">
                    <span class="res-val" id="fromValDisplay">0</span>
                    <span class="res-unit" id="fromUnit">USD</span>
                </div>
                <div class="res-row primary">
                    <span class="res-val" id="toValDisplay">0</span>
                    <span class="res-unit" id="toUnit">TWD</span>
                </div>
            </div>
        </div>

        <!-- Keypad -->
        <div class="keypad">
            <button class="key operator" data-key="(">(</button>
            <button class="key operator" data-key=")">)</button>
            <button class="key operator" data-key="%">%</button>
            <button class="key action" data-key="AC">AC</button>
            
            <button class="key" data-key="7">7</button>
            <button class="key" data-key="8">8</button>
            <button class="key" data-key="9">9</button>
            <button class="key operator" data-key="/">÷</button>
            
            <button class="key" data-key="4">4</button>
            <button class="key" data-key="5">5</button>
            <button class="key" data-key="6">6</button>
            <button class="key operator" data-key="*">×</button>
            
            <button class="key" data-key="1">1</button>
            <button class="key" data-key="2">2</button>
            <button class="key" data-key="3">3</button>
            <button class="key operator" data-key="-">-</button>
            
            <button class="key" data-key="0">0</button>
            <button class="key" data-key=".">.</button>
            <button class="key action" data-key="BACK"><i data-lucide="delete"></i></button>
            <button class="key operator" data-key="+">+</button>
            
            <!-- Extra row for equals on desktop or compact mobile -->
            <button class="key equal" data-key="=" style="grid-column: span 4; height: 60px; margin-top: 10px;">=</button>
        </div>
    </div>

    <!-- Side Menu -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="side-menu" id="sideMenu">
            <div class="menu-header">
                <div class="menu-title">Settings</div>
                <button class="icon-btn" id="closeMenuBtn"><i data-lucide="x"></i></button>
            </div>
            
            <div class="menu-group">
                <div class="menu-group-label">數據與計算</div>
                <div class="menu-item" id="historyBtn">
                    <i data-lucide="history"></i> 歷史紀錄回溯
                </div>
                <div class="menu-item">
                    <i data-lucide="landmark"></i> 匯率來源
                    <select id="apiSourceSelect">
                        <option value="frankfurter">Frankfurter</option>
                        <option value="exchangerate">ExchangeRate</option>
                        <option value="fawazahmed">Fawazahmed0</option>
                    </select>
                </div>
                <div class="menu-item">
                    <i data-lucide="hash"></i> 小數點位數
                    <select id="precisionSelect">
                        <option value="0">0 位</option>
                        <option value="2" selected>2 位</option>
                        <option value="3">3 位</option>
                        <option value="4">4 位</option>
                    </select>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-group-label">顯示設定</div>
                <div class="menu-item" id="themeToggle">
                    <i data-lucide="moon"></i> 深色模式
                    <input type="checkbox" id="themeCheckbox" style="margin-left: auto;">
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-group-label">工具</div>
                <div class="menu-item" id="shareBtn">
                    <i data-lucide="share-2"></i> 複製與分享
                </div>
            </div>
        </div>
    </div>

    <!-- History Overlay -->
    <div class="history-overlay" id="historyOverlay">
        <div class="history-header">
            <div class="menu-title">History</div>
            <button class="icon-btn" id="closeHistoryBtn"><i data-lucide="x"></i></button>
        </div>
        <div class="history-list" id="historyList">
            <!-- History items will be injected here -->
        </div>
        <button class="key operator" id="clearHistoryBtn" style="height: 50px; margin-top: 10px; font-size: 1rem; border-radius: 12px;">清除所有紀錄</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="app.js"></script>
</body>
</html>
